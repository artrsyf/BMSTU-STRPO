apiVersion: apps/v1
kind: Deployment
metadata:
  name: driving-school
  namespace: driving-school
  labels:
    simodo.local/work: driving-school
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driving-school
  template:
    metadata:
      labels:
        app: driving-school
        simodo.local/work: driving-school
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: driving-school
          image: registry.local:5050/simodo-labs/driving-school:latest
          imagePullPolicy: Always
          ports:
            - name: students
              containerPort: 8081
            - name: training
              containerPort: 8082
            - name: exams
              containerPort: 8083
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: students
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: students
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: driving-school-students
  namespace: driving-school
spec:
  selector:
    app: driving-school
  ports:
    - name: http
      port: 80
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: driving-school-training
  namespace: driving-school
spec:
  selector:
    app: driving-school
  ports:
    - name: http
      port: 80
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: driving-school-exams
  namespace: driving-school
spec:
  selector:
    app: driving-school
  ports:
    - name: http
      port: 80
      targetPort: 8083
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: driving-school
  namespace: driving-school
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: driving-school-driving-school-strip@kubernetescrd
spec:
  rules:
    - host: labs.local
      http:
        paths:
          - path: /driving-school/students
            pathType: Prefix
            backend:
              service:
                name: driving-school-students
                port:
                  number: 80
          - path: /driving-school/training-plans
            pathType: Prefix
            backend:
              service:
                name: driving-school-training
                port:
                  number: 80
          - path: /driving-school/exam-applications
            pathType: Prefix
            backend:
              service:
                name: driving-school-exams
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: driving-school-strip
  namespace: driving-school
spec:
  stripPrefix:
    prefixes:
      - /driving-school
