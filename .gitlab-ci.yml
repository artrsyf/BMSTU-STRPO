image: alt:p10

stages:
  - test
  - delivery

before_script:
  - apt-get -y update
  - export DEBIAN_FRONTEND=noninteractive
  - export TZ=Europe/Moscow
  - echo 'rpm http://simodo.ru/packages/rpm/alt/p10/repo x86_64 hasher' > /etc/apt/sources.list.d/simodo.list
  - apt-get -y update
  - apt-get -y install curl simodo-loom simodo-loom-stellar

testing:
  stage: test
  script:
    - chmod +x test/00-run-ci test/01-student-flow test/02-training-flow test/03-exam-flow test/98-smoke-check test/99-demo-flow
    - sh test/00-run-ci
    - sh test/98-smoke-check
  after_script:
    - test -f /tmp/drivingschool-demo.out && cp /tmp/drivingschool-demo.out demo.out || true
    - cat /tmp/base.log /tmp/students.log /tmp/training.log /tmp/exams.log > simodo.log 2>&1 || true
    - cp simodo.log index.html || true
    - pkill -f simodo-stellar || true
  artifacts:
    when: always
    paths:
      - demo.out
      - simodo.log
      - index.html
    expire_in: 30 minutes
  only:
    - main
    - master

pages:
  stage: delivery
  needs:
    - job: testing
      artifacts: true
  script:
    - mkdir -p public
    - printf '<!doctype html><meta charset="utf-8"><title>Driving School SIMODO demo</title><pre>' > public/index.html
    - sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' demo.out >> public/index.html
    - printf '</pre>' >> public/index.html
  artifacts:
    paths:
      - public
  only:
    - main
    - master

deploy:
  image: alpine:latest
  stage: delivery
  needs:
    - job: testing
  before_script: []
  script:
    - apk --update add openssh-client rsync curl
    - test -n "$SERVER_IP" || { echo "SERVER_IP is not available in this job"; exit 1; }
    - test -n "$SSH_PRIVATE_KEY" || { echo "SSH_PRIVATE_KEY is not available in this job"; exit 1; }
    - DEPLOY_USER="${DEPLOY_USER:-driving}"
    - DEPLOY_MODULE_PATH="${DEPLOY_MODULE_PATH:-/root/simodo-stellar/modules/driving/}"
    - PUBLIC_BASE_URL="${PUBLIC_BASE_URL:-http://$SERVER_IP/driving}"
    - echo "Deploying to $DEPLOY_USER@$SERVER_IP:$DEPLOY_MODULE_PATH"
    - mkdir -m 700 ~/.ssh
    - eval $(ssh-agent -s)
    - if test -f "$SSH_PRIVATE_KEY"; then cp "$SSH_PRIVATE_KEY" ~/.ssh/deploy_key; else printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key; fi
    - chmod 600 ~/.ssh/deploy_key
    - ssh-add ~/.ssh/deploy_key
    - ssh-add -l -E sha256
    - ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$SERVER_IP" "mkdir -p '$DEPLOY_MODULE_PATH'"
    - rsync -a -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" --delete --exclude='.git' --exclude='demo.out' --exclude='simodo.log' --exclude='index.html' --exclude='public' ./ "$DEPLOY_USER@$SERVER_IP:$DEPLOY_MODULE_PATH"
    - ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$SERVER_IP" "/root/simodo-stellar/restart_docker.sh"
    - sleep 5
    - curl -fsS "$PUBLIC_BASE_URL/students"
  only:
    - main
    - master
